# Registry of DataSF datasets used in this project.
#
# Each entry:
#   id:     9-character Socrata dataset ID (from the data.sfgov.org URL)
#   format: geojson | csv   (how we fetch it from the SODA API)
#   name:   official title on DataSF
#   notes:  why we use it / anything non-obvious
#
# Fetch with:  from sfdata import fetch; gdf = fetch.load("supervisor_districts")

datasets:
  city_boundary:
    id: txuc-3kzm
    format: geojson
    name: SF Shoreline and Islands
    notes: >-
      Land area of the City and County of San Francisco (shoreline-trimmed,
      includes islands). Used as the base city outline.

  supervisor_districts:
    id: cqbw-m5m3
    format: geojson
    name: Current Supervisor Districts
    notes: >-
      The 11 current supervisor districts (post-2022 redistricting; DataSF
      keeps this dataset pointed at whatever is current). For the 2012-2022
      era use keex-zmn4.

  analysis_neighborhoods:
    id: j2bu-swwd
    format: geojson
    name: Analysis Neighborhoods
    notes: >-
      The 41 Analysis Neighborhoods DataSF uses for citywide statistics; most
      neighborhood-level datasets key to these names.

  census_tracts:
    id: tmph-tgz9
    format: geojson
    name: "Census 2020: Tracts for San Francisco"
    notes: >-
      2020 census tract polygons; the join target for tract-keyed data
      (ACS, demographics).

  park_scores:
    id: r33y-seqv
    format: csv
    name: Annual Park Evaluation Scores (FY15-now)
    notes: >-
      Rec & Park maintenance evaluation scores per park per fiscal year
      (FY2015-). park_score is a 0-1 fraction. supervisor_district can be
      comma-separated when a park spans districts; district assignments
      reflect current (post-2022) boundaries for all years.

  parking_meters:
    id: 8vzz-qzz9
    format: csv
    name: Parking Meters
    notes: >-
      SFMTA meter inventory: one row per meter post with exact lat/lon, cap
      color, meter type (SS single-space / MS multi-space pay station),
      active_meter_flag (M = active), jurisdiction, and pre-joined
      supervisor_district / analysis_neighborhood. ~39k rows, updated weekly.

  meter_policies:
    id: qq7v-hds4
    format: csv
    name: Meter Policies
    notes: >-
      Current operating/rate schedule per metered space: one row per meter x
      day-of-week x time window with scheduletype (OP paid / FREE / PRE
      pre-payment / ALT / TOW) plus hourly rate and time limit. ~880k rows,
      refreshed daily; effectively a snapshot (enddates are year 2200), so no
      policy history. Joins to parking_meters on postid = post_id. Caveat:
      ~25% of active meters (multi-space pay stations, most motorcycle
      meters) have no policy rows; mspaystationid is never populated.

  tracts_to_neighborhoods:
    id: sevw-6tgi
    format: csv
    name: Analysis Neighborhoods - 2020 census tracts assigned to neighborhoods
    notes: >-
      Crosswalk from 2020 census tracts to Analysis Neighborhoods, for
      rolling tract-level data up to neighborhoods without a spatial join.
